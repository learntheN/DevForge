<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH 远程连接</title>
  <script src="/assets/js/tailwind.js"></script>
  <link rel="stylesheet" href="/assets/css/fontawesome.min.css">
  <style>
    body { opacity: 0; transition: opacity 0.1s; }
    body.ready { opacity: 1; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; font-weight: 500; z-index: 1000; animation: fadeIn 0.3s ease-out; }
    .toast-success { background: #22c55e; }
    .toast-error { background: #ef4444; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .terminal { font-family: 'Courier New', monospace; font-size: 14px; }
    .terminal-line { white-space: pre-wrap; word-break: break-all; }
    .terminal-input { background: transparent; border: none; outline: none; width: 100%; color: inherit; font: inherit; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="container mx-auto p-4">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-terminal text-green-500 mr-2"></i>SSH 远程连接</h1>
      <p class="text-gray-600 mt-1">配置和管理 SSH 连接，模拟终端操作</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-6">
      <!-- 左侧配置面板 -->
      <div class="lg:w-1/3">
        <div class="bg-white rounded-xl shadow p-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-800">连接配置</h2>
            <div class="flex gap-2">
              <button id="btnSave" class="px-3 py-1.5 bg-green-500 hover:bg-green-600 text-white rounded-lg text-sm transition">
                <i class="fas fa-save mr-1"></i>保存
              </button>
              <button id="btnNew" class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg text-sm transition">
                <i class="fas fa-plus mr-1"></i>新建
              </button>
            </div>
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">选择配置</label>
            <select id="configSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
              <option value="">-- 选择配置 --</option>
            </select>
          </div>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">服务器地址</label>
              <input id="inputHost" type="text" placeholder="example.com" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
            </div>
            <div class="flex gap-4">
              <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">端口</label>
                <input id="inputPort" type="number" value="22" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
              </div>
              <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input id="inputUser" type="text" placeholder="root" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">密码/密钥</label>
              <input id="inputPass" type="password" placeholder="密码或密钥内容" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
            </div>
            <div>
              <label class="flex items-center">
                <input id="checkKey" type="checkbox" class="mr-2">
                <span class="text-sm text-gray-700">使用密钥认证</span>
              </label>
            </div>
          </div>

          <div class="mt-6 pt-5 border-t border-gray-200">
            <div class="flex items-center justify-between mb-4">
              <div>
                <span id="statusText" class="text-sm font-medium text-gray-500">未连接</span>
                <div id="statusTime" class="text-xs text-gray-400 hidden">连接时长: <span>0</span>秒</div>
              </div>
              <button id="btnConnect" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-medium transition flex items-center">
                <i class="fas fa-plug mr-2"></i>连接
              </button>
            </div>
            <div class="flex gap-2">
              <button id="btnTest" class="flex-1 px-3 py-2 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-lg text-sm transition">
                <i class="fas fa-vial mr-1"></i>测试连接
              </button>
              <button id="btnClear" class="flex-1 px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm transition">
                <i class="fas fa-broom mr-1"></i>清空终端
              </button>
            </div>
          </div>
        </div>

        <!-- 命令历史 -->
        <div class="bg-white rounded-xl shadow p-5 mt-6">
          <h2 class="text-lg font-semibold text-gray-800 mb-4">命令历史</h2>
          <div id="historyList" class="space-y-2 max-h-60 overflow-y-auto">
            <div class="text-gray-400 text-sm text-center py-4">暂无历史命令</div>
          </div>
        </div>
      </div>

      <!-- 右侧终端界面 -->
      <div class="lg:w-2/3">
        <div class="bg-gray-900 rounded-xl shadow overflow-hidden h-full flex flex-col">
          <div class="bg-gray-800 px-5 py-3 flex items-center justify-between">
            <div class="flex items-center">
              <div class="w-3 h-3 rounded-full bg-red-500 mr-2"></div>
              <div class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></div>
              <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
              <span class="text-gray-300 text-sm ml-2">SSH 终端</span>
            </div>
            <div id="termStatus" class="text-gray-400 text-sm">就绪</div>
          </div>
          
          <div id="terminalOutput" class="terminal text-green-400 p-5 flex-1 overflow-y-auto">
            <div class="terminal-line">SSH 远程连接终端模拟器</div>
            <div class="terminal-line text-gray-400 mt-2">输入命令并按回车执行，使用 ↑↓ 键浏览历史命令</div>
            <div class="terminal-line text-gray-400 mt-1">连接后可以执行基本的 Linux 命令</div>
            <div class="terminal-line mt-4">$ <span class="text-gray-300">等待连接...</span></div>
          </div>
          
          <div class="border-t border-gray-800 px-5 py-3 flex items-center">
            <span class="text-green-400 mr-2">$</span>
            <input id="terminalInput" type="text" class="terminal-input text-gray-300 flex-1" placeholder="输入命令..." disabled>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let configs = [];
    let currentConfig = null;
    let isConnected = false;
    let connectStart = 0;
    let timer = null;
    let history = [];
    let historyIndex = -1;

    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} mr-2"></i>${msg}`;
      document.body.appendChild(toast);
      setTimeout(() => { 
        toast.style.opacity = '0'; 
        setTimeout(() => toast.remove(), 300); 
      }, 2000);
    }

    function loadConfigs() {
      const saved = localStorage.getItem('ssh_configs');
      if (saved) {
        try {
          configs = JSON.parse(saved);
          updateConfigSelect();
        } catch(e) {
          console.error('加载配置失败:', e);
        }
      }
    }

    function saveConfigs() {
      localStorage.setItem('ssh_configs', JSON.stringify(configs));
    }

    function updateConfigSelect() {
      const select = document.getElementById('configSelect');
      select.innerHTML = '<option value="">-- 选择配置 --</option>';
      configs.forEach((cfg, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${cfg.name || '未命名'} (${cfg.host})`;
        select.appendChild(opt);
      });
    }

    function loadConfig(index) {
      if (index >= 0 && index < configs.length) {
        currentConfig = configs[index];
        document.getElementById('inputHost').value = currentConfig.host || '';
        document.getElementById('inputPort').value = currentConfig.port || 22;
        document.getElementById('inputUser').value = currentConfig.user || '';
        document.getElementById('inputPass').value = currentConfig.pass || '';
        document.getElementById('checkKey').checked = currentConfig.useKey || false;
      }
    }

    function saveCurrentConfig() {
      const host = document.getElementById('inputHost').value.trim();
      const port = parseInt(document.getElementById('inputPort').value) || 22;
      const user = document.getElementById('inputUser').value.trim();
      const pass = document.getElementById('inputPass').value;
      const useKey = document.getElementById('checkKey').checked;

      if (!host || !user) {
        showToast('请填写服务器地址和用户名', 'error');
        return;
      }

      const cfg = { host, port, user, pass, useKey };
      
      if (currentConfig) {
        Object.assign(currentConfig, cfg);
      } else {
        cfg.name = `${user}@${host}`;
        configs.push(cfg);
        currentConfig = cfg;
        updateConfigSelect();
        document.getElementById('configSelect').value = configs.length - 1;
      }
      
      saveConfigs();
      showToast('配置已保存');
    }

    function newConfig() {
      currentConfig = null;
      document.getElementById('inputHost').value = '';
      document.getElementById('inputPort').value = 22;
      document.getElementById('inputUser').value = '';
      document.getElementById('inputPass').value = '';
      document.getElementById('checkKey').checked = false;
      document.getElementById('configSelect').value = '';
    }

    function updateStatus() {
      const statusText = document.getElementById('statusText');
      const btnConnect = document.getElementById('btnConnect');
      const termStatus = document.getElementById('termStatus');
      const input = document.getElementById('terminalInput');
      
      if (isConnected) {
        statusText.textContent = '已连接';
        statusText.className = 'text-sm font-medium text-green-600';
        btnConnect.innerHTML = '<i class="fas fa-power-off mr-2"></i>断开';
        btnConnect.className = 'px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition flex items-center';
        termStatus.textContent = '已连接';
        termStatus.className = 'text-green-400 text-sm';
        input.disabled = false;
        input.placeholder = '输入命令...';
        document.getElementById('statusTime').classList.remove('hidden');
      } else {
        statusText.textContent = '未连接';
        statusText.className = 'text-sm font-medium text-gray-500';
        btnConnect.innerHTML = '<i class="fas fa-plug mr-2"></i>连接';
        btnConnect.className = 'px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-medium transition flex items-center';
        termStatus.textContent = '就绪';
        termStatus.className = 'text-gray-400 text-sm';
        input.disabled = true;
        input.placeholder = '请先建立连接...';
        document.getElementById('statusTime').classList.add('hidden');
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }
    }

    function connect() {
      const host = document.getElementById('inputHost').value.trim();
      const user = document.getElementById('inputUser').value.trim();
      
      if (!host || !user) {
        showToast('请填写服务器地址和用户名', 'error');
        return;
      }

      if (isConnected) {
        isConnected = false;
        addTerminalLine('连接已断开');
        showToast('连接已断开');
      } else {
        isConnected = true;
        connectStart = Date.now();
        addTerminalLine(`正在连接 ${user}@${host}...`);
        addTerminalLine('连接成功 (模拟模式)');
        addTerminalLine('$ ');
        showToast('连接成功 (模拟模式)');
        
        timer = setInterval(() => {
          const sec = Math.floor((Date.now() - connectStart) / 1000);
          document.querySelector('#statusTime span').textContent = sec;
        }, 1000);
      }
      
      updateStatus();
    }

    function testConnection() {
      const host = document.getElementById('inputHost').value.trim();
      if (!host) {
        showToast('请填写服务器地址', 'error');
        return;
      }
      showToast('测试连接中...');
      setTimeout(() => {
        showToast('连接测试完成 (模拟)', 'success');
      }, 1000);
    }

    function addTerminalLine(text) {
      const output = document.getElementById('terminalOutput');
      const line = document.createElement('div');
      line.className = 'terminal-line mt-1';
      line.textContent = text;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function addHistory(cmd) {
      if (!cmd.trim()) return;
      history.unshift(cmd);
      if (history.length > 20) history.pop();
      updateHistoryList();
      historyIndex = -1;
    }

    function updateHistoryList() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<div class="text-gray-400 text-sm text-center py-4">暂无历史命令</div>';
        return;
      }
      
      list.innerHTML = '';
      history.slice(0, 10).forEach(cmd => {
        const item = document.createElement('div');
        item.className = 'text-sm text-gray-700 p-2 bg-gray-50 rounded hover:bg-gray-100 cursor-pointer';
        item.textContent = cmd;
        item.onclick = () => {
          document.getElementById('terminalInput').value = cmd;
        };
        list.appendChild(item);
      });
    }

    function clearTerminal() {
      document.getElementById('terminalOutput').innerHTML = 
        '<div class="terminal-line">终端已清空</div>' +
        '<div class="terminal-line mt-4">$ <span class="text-gray-300">等待输入...</span></div>';
    }

    function execCommand(cmd) {
      if (!isConnected) {
        showToast('请先建立连接', 'error');
        return;
      }
      
      addTerminalLine(`$ ${cmd}`);
      addHistory(cmd);
      
      const responses = {
        'ls': 'file1.txt  file2.txt  folder1  folder2',
        'pwd': '/home/user',
        'whoami': 'user',
        'date': new Date().toString(),
        'echo hello': 'hello',
        'help': '可用命令: ls, pwd, whoami, date, echo, clear' 
      };
      
      const response = responses[cmd] || `命令未找到: ${cmd.split(' ')[0]}`;
      addTerminalLine(response);
      addTerminalLine('$ ');
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadConfigs();
      
      document.getElementById('configSelect').addEventListener('change', (e) => {
        if (e.target.value !== '') {
          loadConfig(parseInt(e.target.value));
        }
      });
      
      document.getElementById('btnSave').addEventListener('click', saveCurrentConfig);
      document.getElementById('btnNew').addEventListener('click', newConfig);
      document.getElementById('btnConnect').addEventListener('click', connect);
      document.getElementById('btnTest').addEventListener('click', testConnection);
      document.getElementById('btnClear').addEventListener('click', clearTerminal);
      
      const termInput = document.getElementById('terminalInput');
      termInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const cmd = termInput.value.trim();
          if (cmd) {
            execCommand(cmd);
            termInput.value = '';
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (historyIndex < history.length - 1) {
            historyIndex++;
            termInput.value = history[historyIndex] || '';
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIndex > 0) {
            historyIndex--;
            termInput.value = history[historyIndex] || '';
          } else {
            historyIndex = -1;
            termInput.value = '';
          }
        }
      });
      
      updateStatus();
      document.body.classList.add('ready');
    });
  </script>
</body>
</html>
